openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PropVeri Real Estate Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: properties
    description: Property listings
  - name: packages
    description: Subscription packages
  - name: users
    description: User management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List all verified properties
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: integer
        - name: maxPrice
          in: query
          schema:
            type: integer
        - name: city
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [properties]
      summary: List a new property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "400":
          description: Invalid location or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Package limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /properties/featured:
    get:
      operationId: listFeaturedProperties
      tags: [properties]
      summary: Get featured/highlighted properties
      responses:
        "200":
          description: Featured properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"

  /properties/stats:
    get:
      operationId: getPropertyStats
      tags: [properties]
      summary: Get aggregate property stats (for dashboard/homepage)
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyStats"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get a single property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyUpdate"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /properties/{id}/verify-location:
    post:
      operationId: verifyPropertyLocation
      tags: [properties]
      summary: Verify that a property's location coordinates match the given address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationVerifyInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationVerifyResult"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create / register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/properties:
    get:
      operationId: getUserProperties
      tags: [users]
      summary: Get all properties listed by a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List all available subscription packages
      responses:
        "200":
          description: Package list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get a single package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /user-packages:
    get:
      operationId: listUserPackages
      tags: [packages]
      summary: List all user package subscriptions
      responses:
        "200":
          description: User packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPackage"
    post:
      operationId: purchasePackage
      tags: [packages]
      summary: Subscribe a user to a package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPackageInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPackage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Property:
      type: object
      required:
        - id
        - title
        - description
        - address
        - city
        - state
        - latitude
        - longitude
        - listedPrice
        - actualVisitPrice
        - type
        - status
        - locationVerified
        - ownerId
        - bedrooms
        - bathrooms
        - areasqft
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        listedPrice:
          type: integer
          description: Price in INR (lakhs)
        actualVisitPrice:
          type: integer
          description: Real price after physical visit, in INR (lakhs)
        type:
          type: string
          description: "apartment, villa, plot, commercial"
        status:
          type: string
          description: "pending_verification, verified, rejected, sold"
        locationVerified:
          type: boolean
        ownerId:
          type: integer
        bedrooms:
          type: integer
        bathrooms:
          type: integer
        areasqft:
          type: integer
        imageUrl:
          type: ["string", "null"]
        featured:
          type: boolean
        createdAt:
          type: string

    PropertyInput:
      type: object
      required:
        - title
        - description
        - address
        - city
        - state
        - latitude
        - longitude
        - listedPrice
        - actualVisitPrice
        - type
        - ownerId
        - bedrooms
        - bathrooms
        - areasqft
      properties:
        title:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        listedPrice:
          type: integer
        actualVisitPrice:
          type: integer
        type:
          type: string
        ownerId:
          type: integer
        bedrooms:
          type: integer
        bathrooms:
          type: integer
        areasgft:
          type: integer
        imageUrl:
          type: string

    PropertyUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        listedPrice:
          type: integer
        actualVisitPrice:
          type: integer
        status:
          type: string
        featured:
          type: boolean
        imageUrl:
          type: string

    PropertyStats:
      type: object
      required:
        - totalListings
        - verifiedListings
        - pendingVerification
        - totalCities
        - avgListedPrice
        - byType
      properties:
        totalListings:
          type: integer
        verifiedListings:
          type: integer
        pendingVerification:
          type: integer
        totalCities:
          type: integer
        avgListedPrice:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer

    LocationVerifyInput:
      type: object
      required:
        - address
        - latitude
        - longitude
      properties:
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    LocationVerifyResult:
      type: object
      required:
        - verified
        - message
      properties:
        verified:
          type: boolean
        message:
          type: string
        distanceKm:
          type: ["number", "null"]

    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          description: "owner, agent, developer, buyer"
        phone:
          type: ["string", "null"]
        activePackageId:
          type: ["integer", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required:
        - name
        - email
        - role
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        phone:
          type: string

    Package:
      type: object
      required:
        - id
        - name
        - price
        - listingsAllowed
        - durationDays
        - features
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: integer
          description: Price in INR
        listingsAllowed:
          type: integer
          description: Number of property listings allowed
        durationDays:
          type: integer
        features:
          type: array
          items:
            type: string
        popular:
          type: boolean

    UserPackage:
      type: object
      required:
        - id
        - userId
        - packageId
        - startDate
        - endDate
        - status
        - listingsUsed
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        status:
          type: string
          description: "active, expired, cancelled"
        listingsUsed:
          type: integer

    UserPackageInput:
      type: object
      required:
        - userId
        - packageId
      properties:
        userId:
          type: integer
        packageId:
          type: integer
